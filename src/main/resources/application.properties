# ==============================================================================
# APPLICATION PROPERTIES - Water Scarcity Prediction Optimizer
# ==============================================================================

# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.application.name=water-scarcity-optimizer

# ==============================================================================
# DATABASE CONFIGURATION
# ==============================================================================
# MySQL Database Connection (Update credentials as needed)
spring.datasource.url=jdbc:mysql://localhost:3306/water_scarcity_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=janhvi7799
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==============================================================================
# LOGGING CONFIGURATION
# ==============================================================================
logging.level.root=INFO
logging.level.com.water.scarcity=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# ==============================================================================
# JACKSON JSON CONFIGURATION
# ==============================================================================
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# ==============================================================================
# APPLICATION CUSTOM PROPERTIES
# ==============================================================================
# ML Model Configuration
app.ml.model.accuracy-threshold=0.75
app.ml.model.prediction-days=30

# Water Distribution Configuration
app.distribution.algorithm=greedy
app.distribution.min-allocation=50
app.distribution.max-allocation=1000

# ==============================================================================
# ACTUATOR & MONITORING
# ==============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
